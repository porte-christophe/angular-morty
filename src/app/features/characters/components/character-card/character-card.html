<article
    class="group relative flex h-full flex-col overflow-hidden rounded-3xl border border-green-400/20 bg-slate-900/70 shadow-xl backdrop-blur-xl transition duration-500 hover:-translate-y-2 hover:border-green-400/60 hover:shadow-[0_0_40px_rgba(74,222,128,0.25)]"
>

  <!-- Glow -->
  <div
    class="absolute -right-20 -top-20 h-48 w-48 rounded-full bg-green-400/10 blur-3xl transition group-hover:bg-green-400/20"
  ></div>

  <!-- Image -->
  <div class="relative">

    <img
      [src]="character().image"
      [alt]="character().name"
      class="h-72 w-full shrink-0 object-cover"
    />

    <!-- Status -->
    <div
      class="absolute bottom-4 left-4 flex items-center gap-2 rounded-full bg-slate-950/80 px-4 py-2 backdrop-blur"
    >

      <span
        class="h-3 w-3 rounded-full"
        [ngClass]="{
          'bg-green-400 shadow-[0_0_10px_#4ade80]': character().status === 'Alive',
          'bg-red-500 shadow-[0_0_10px_#ef4444]': character().status === 'Dead',
          'bg-gray-400': character().status === 'unknown'
        }"
      ></span>

      <span class="text-sm font-semibold text-white">
        {{ character().status }}
      </span>

    </div>

  </div>


  <!-- Content -->
  <div class="relative flex flex-1 flex-col p-6">

    <h2
      class="line-clamp-1 text-3xl font-black text-white"
    >
      {{ character().name }}
    </h2>


    <p
      class="mt-1 text-sm uppercase tracking-[0.25em] text-green-300"
    >
      {{ character().species }}
    </p>


    <!-- Infos -->

    <div class="mt-6 space-y-4">


      <div class="flex items-center justify-between">
        <span class="text-slate-400">
          Type
        </span>

        <span class="font-semibold text-cyan-300">
          {{ character().type || 'Unknown' }}
        </span>
      </div>


      <div class="flex items-center justify-between">
        <span class="text-slate-400">
          Genre
        </span>

        <span class="font-semibold text-white">
          {{ character().gender }}
        </span>
      </div>


      <div>

        <span class="text-slate-400">
          Origine
        </span>

        <p class="line-clamp-1 mt-1 font-semibold text-white">
          {{ character().origin.name }}
        </p>

      </div>


      <div>

        <span class="text-slate-400">
          Localisation
        </span>

        <p class="line-clamp-1 mt-1 font-semibold text-white">
          {{ character().location.name }}
        </p>

      </div>


    </div>


    <!-- Footer -->

    <div
      class="mt-6 flex items-center justify-between border-t border-slate-700 pt-4"
    >

      <span class="text-sm text-slate-400">
        {{ character().episode.length }} épisode(s)
      </span>


    </div>


  </div>

</article>
